[verbosity]
# Content baseline for Vant public model.
# Split into handlers for different contexts.

# RESPONSE: How Vant replies to prompts/questions
# terse = short, direct answers
# normal = balanced, clear
# verbose = detailed explanations
response=terse

# CONTENT: How Vant writes docs/README/changelog
# minimal = just facts, no fluff
# standard = clear, no clichés (per CONTENT.md)
# extended = full detail, edge cases
content=standard

# COMMENT: How Vant writes code comments
# brief = what/why, skip obvious
# normal = context + purpose
# detailed = full reasoning, edge cases
comment=normal

# CODE: How Vant writes code itself
# concise = one-liners preferred
# readable = standard formatting
# explicit = extra clarity, more variable names
code=readable

# LOG: How Vant logs runtime info
# quiet = errors only
# normal = warnings + errors
# verbose = debug + info + warnings + errors
log=normal

# TRANSPORT: For scientific/academic use (brain transfer)
# You can extend this section for specialized contexts
# The baseline enforces: no clichés, short dashes, specific over abstract
