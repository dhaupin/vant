name: Build and Push VANT

on:
  push:
    branches: [main, v0.8.2]
    tags:
      - 'v*'
      - 'checkpoint-*'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    # Only build on push to main, v0.8.2, or tags
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: dhaupin/vant
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=match,pattern=checkpoint-(.*),group=1

      - name: Build VANT
        run: |
          echo "Building VANT..."
          VERSION=$(node -p "require('./package.json').version")
          REF_NAME="${{ github.ref_name }}"
          if [[ "$REF_NAME" == "main" ]]; then
            docker build --build-arg VERSION=$VERSION . -t dhaupin/vant:latest
          elif [[ "$REF_NAME" == "v0.8.2" ]]; then
            docker build --build-arg VERSION=0.8.2 . -t dhaupin/vant:v0.8.2 -t dhaupin/vant:latest
          elif [[ "$REF_NAME" =~ ^v ]]; then
            docker build --build-arg VERSION=$REF_NAME . -t "dhaupin/vant:$REF_NAME"
          fi

      - name: Push to Hub
        if: github.event_name == 'push'
        run: |
          echo "Pushing to Hub..."
          TAGS="${{ steps.meta.outputs.tags }}"
          for TAG in $TAGS; do
            docker push dhaupin/vant:$TAG
          done
