name: Build and Push VANT

on:
  push:
    branches: [main, v0.8.2]
    tags:
      - 'v*'
      - 'checkpoint-*'
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    # Only build on PRs, push to main, or tags
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: dhaupin/vant
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=match,pattern=checkpoint-(.*),group=1
            type=raw,value=v0.8.2,enable=branch:v0.8.2

      - name: Build VANT
        run: |
          echo "Building VANT..."

      - name: Push to Hub
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/v0.8.2')
        run: |
          echo "Pushing to Docker Hub..."
          docker push dhaupin/vant:latest
          docker push dhaupin/vant:v0.8.2
