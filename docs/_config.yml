title: Vant
description: AI memory for agents
markdown: kramdown
plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - _sidebar.yml

# Build settings
permalink: pretty
exclude: ['README.md']

# Default layouts per collection
defaults:
  - scope:
      path: guides
    values:
      layout: default
  - scope:
      path: reference
    values:
      layout: default
  - scope:
      path: getting-started
    values:
      layout: default
