# Jekyll config for Vant docs
title: Vant
baseurl: "/vant"
url: "https://docs.creadev.org"
description: AI memory for agents
markdown: kramdown
highlighter: rouge

# Build settings
permalink: pretty
exclude: ['README.md', 'Gemfile', 'Gemfile.lock', 'tmp', 'pagefind*']

# Kramdown settings for syntax highlighting
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    default_lang: plaintext
    css_class: 'highlight'
    span:
      decorator: '<span class="language-{}">{}</span>'
    block:
      decorator: '<div class="language-{}"><pre class="line-numbers">{}</pre></div>'

# Default layouts for all docs
defaults:
  - scope:
      type: pages
    values:
      layout: default

# Custom section titles for navigation (folder => display title)
nav_sections:
  getting-started: "Getting Started"
  tutorials: "Tutorials"
  reference: "Reference"
  guides: "Guides"
  community: "Community"
  legal: "Legal"

# Section order (numeric - lower shows first)
nav_order:
  getting-started: 1
  tutorials: 2
  guides: 3
  reference: 4
  community: 5
  legal: 6
